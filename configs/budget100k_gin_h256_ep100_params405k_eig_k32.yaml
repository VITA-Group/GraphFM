dataset:
  num_classes: 8
  rho: 0.5
  num_terms: 8
  coeff_scale: 0.25
  train_sizes:
  - 128
  - 256
  - 512
  - 1024
  test_sizes:
  - 128
  - 256
  - 512
  - 1024
  - 2048
  per_class_train: 10
  per_class_test: 5
  total_budget: 100000
  seed: 0
