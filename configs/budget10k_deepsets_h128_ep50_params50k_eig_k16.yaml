# Toy scale config (current default)
# Filename: budget10k_deepsets_h128_ep50_params50k_eig_k16.yaml

experiment:
  num_classes: 4
  rho: 0.5
  num_terms: 5
  coeff_scale: 0.2
  train_sizes: [64, 128, 256, 512]
  test_sizes: [64, 128, 256, 512, 768, 1024]
  per_class_train: 3
  per_class_test: 2
  total_budget: 10000
  lambda_mix: 0.0
  seed: 0

train:
  epochs: 50
  lr: 0.001
  weight_decay: 0.0001
  batch_size: 1
  model: deepsets
  hidden: 128
  degree_bins: 32
  device: cpu

pe:
  kind: eig
  k: 16
  m: 16
  spe_alpha: 10.0
  spe_tau: 0.0
  seed: 0
