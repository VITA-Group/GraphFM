# Large scale config (Foundation Model scale)
# Filename: budget10m_gin_h768_ep500_params10m_proj_k128_m64.yaml

dataset:
  num_classes: 32
  rho: 0.5
  num_terms: 15
  coeff_scale: 0.3
  train_sizes: [512, 1024, 2048, 4096, 8192]
  test_sizes: [512, 1024, 2048, 4096, 8192, 16384]
  per_class_train: 100
  per_class_test: 50
  total_budget: 10_000_000
  lambda_mix: 0.0
  seed: 0

train:
  epochs: 500
  lr: 0.0001
  weight_decay: 0.00001
  batch_size: 1
  model: gin
  hidden: 768
  degree_bins: 128
  device: cuda

pe:
  kind: proj
  k: 128
  m: 64
  spe_alpha: 10.0
  spe_tau: 0.0
  seed: 0
